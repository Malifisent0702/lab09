name: CMake Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  buid:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (formatter_lib)
      run: cmake -B formatter_lib/build -S formatter_lib

    - name: Build formatter_lib
      run: cmake --build formatter_lib/build

    - name: Configure CMake (formatter_ex_lib)
      run: cmake -B formatter_ex_lib/build -S formatter_ex_lib -DCMAKE_PREFIX_PATH=../formatter_lib/build

    - name: Build formatter_ex_lib
      run: cmake --build formatter_ex_lib/build
